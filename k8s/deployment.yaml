# k8s/deployment.yaml
# Buy Box Propensity — Gradio UI + API on EKS
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buybox-propensity-api
  labels:
    app: buybox-propensity-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buybox-propensity-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: buybox-propensity-api
    spec:
      containers:
        - name: api
          image: REPLACE_ME
          ports:
            - containerPort: 7860
              protocol: TCP
          env:
            - name: MODEL_DIR
              value: /app/models
            - name: GRADIO_SERVER_NAME
              value: "0.0.0.0"
            - name: GRADIO_SERVER_PORT
              value: "7860"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /
              port: 7860
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 7860
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 7860
            periodSeconds: 5
            failureThreshold: 3
